<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>起士公爵 業績儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Noto Sans TC', 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; padding: 20px; }
  .container { max-width: 960px; margin: 0 auto; }
  h1 { text-align: center; font-size: 24px; margin-bottom: 4px; }
  .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 18px; }
  .date-bar { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; }
  .date-btn { padding: 8px 16px; border-radius: 20px; border: 1.5px solid #ddd; background: #fff; cursor: pointer; font-size: 14px; font-family: inherit; transition: all .2s; position: relative; }
  .date-btn:hover { border-color: #4a90d9; color: #4a90d9; }
  .date-btn.active { background: #4a90d9; color: #fff; border-color: #4a90d9; }
  .date-btn .badge { position: absolute; top: -6px; right: -6px; background: #e74c3c; color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 8px; }
  .kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
  .kpi-card { background: #fff; border-radius: 12px; padding: 18px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .kpi-card .label { font-size: 13px; color: #888; margin-bottom: 6px; }
  .kpi-card .value { font-size: 28px; font-weight: 700; }
  .kpi-card .sub { font-size: 12px; color: #999; margin-top: 4px; }
  .kpi-total .value { color: #4a90d9; }
  .kpi-shop .value { color: #27ae60; }
  .kpi-team .value { color: #e67e22; }
  .chart-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
  .chart-card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .chart-card h3 { font-size: 14px; color: #555; margin-bottom: 10px; text-align: center; }
  .chart-card canvas { width: 100% !important; height: 180px !important; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  th { background: #f7f8fa; padding: 10px 12px; font-size: 13px; color: #666; text-align: center; border-bottom: 1px solid #eee; }
  td { padding: 10px 12px; text-align: center; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
  tr.highlight { background: #e8f0fe; }
  .table-wrapper { border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
  @media (max-width: 700px) {
    .kpi-row, .chart-row { grid-template-columns: 1fr; }
    .date-btn { padding: 6px 12px; font-size: 13px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🧀 起士公爵 業績儀表板</h1>
  <div class="subtitle">官網 vs 團媽 ｜ 最後更新：2026/3/30 14:06</div>
  <div class="date-bar" id="dateBar"></div>
  <div class="kpi-row">
    <div class="kpi-card kpi-total">
      <div class="label">合計營收</div>
      <div class="value" id="kpiTotal">$0</div>
      <div class="sub" id="kpiTotalSub">0 筆</div>
    </div>
    <div class="kpi-card kpi-shop">
      <div class="label">官網</div>
      <div class="value" id="kpiShop">$0</div>
      <div class="sub" id="kpiShopSub">0 筆</div>
    </div>
    <div class="kpi-card kpi-team">
      <div class="label">團媽</div>
      <div class="value" id="kpiTeam">$0</div>
      <div class="sub" id="kpiTeamSub">0 筆</div>
    </div>
  </div>
  <div class="chart-row">
    <div class="chart-card"><h3>官網營業額</h3><canvas id="chartRev"></canvas></div>
    <div class="chart-card"><h3>官網訂單數</h3><canvas id="chartCount"></canvas></div>
    <div class="chart-card"><h3>官網客單價</h3><canvas id="chartAvg"></canvas></div>
  </div>
  <div class="table-wrapper">
    <table>
      <thead><tr><th>日期</th><th>官網筆數</th><th>官網營收</th><th>團媽筆數</th><th>團媽營收</th><th>合計營收</th></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>
<script>
const days = [
  { key: '3/26', label: '3/26 (四)', shop: {count: 19, rev: 18188}, team: {count: 5, rev: 10672} },
  { key: '3/27', label: '3/27 (五)', shop: {count: 18, rev: 25877}, team: {count: 5, rev: 12249} },
  { key: '3/28', label: '3/28 (六)', shop: {count: 18, rev: 23158}, team: {count: 18, rev: 31349} },
  { key: '3/29', label: '3/29 (日)', shop: {count: 30, rev: 33260}, team: {count: 8, rev: 12292} },
  { key: '3/30', label: '3/30 (一)', shop: {count: 19, rev: 26651}, team: {count: 2, rev: 1398} }
];
const todayKey = '3/30';
let selectedKey = null;
let chartRev, chartCount, chartAvg;

function fmt(n) { return '$' + n.toLocaleString(); }

function buildDateBar() {
  const bar = document.getElementById('dateBar');
  let html = '<button class="date-btn" onclick="selectDate(null)">全部</button>';
  days.forEach(d => {
    const isToday = d.key === todayKey;
    html += '<button class="date-btn" data-key="' + d.key + '" onclick="selectDate(\'' + d.key + '\')">' + d.label + (isToday ? '<span class="badge">今日</span>' : '') + '</button>';
  });
  bar.innerHTML = html;
}

function selectDate(key) {
  selectedKey = key;
  document.querySelectorAll('.date-btn').forEach(btn => {
    const bk = btn.dataset.key || null;
    btn.classList.toggle('active', bk === key);
  });
  updateKPI();
  updateCharts();
  updateTable();
}

function updateKPI() {
  let data = selectedKey ? days.filter(d => d.key === selectedKey) : days;
  let shopRev = 0, shopCount = 0, teamRev = 0, teamCount = 0;
  data.forEach(d => {
    shopRev += d.shop.rev; shopCount += d.shop.count;
    teamRev += d.team.rev; teamCount += d.team.count;
  });
  const total = shopRev + teamRev;
  const totalCount = shopCount + teamCount;
  document.getElementById('kpiTotal').textContent = fmt(total);
  document.getElementById('kpiTotalSub').textContent = totalCount + ' 筆';
  document.getElementById('kpiShop').textContent = fmt(shopRev);
  document.getElementById('kpiShopSub').textContent = shopCount + ' 筆（' + (totalCount ? Math.round(shopCount/totalCount*100) : 0) + '%）';
  document.getElementById('kpiTeam').textContent = fmt(teamRev);
  document.getElementById('kpiTeamSub').textContent = teamCount + ' 筆（' + (totalCount ? Math.round(teamCount/totalCount*100) : 0) + '%）';
}

function updateCharts() {
  const labels = days.map(d => d.key);
  const revData = days.map(d => d.shop.rev);
  const countData = days.map(d => d.shop.count);
  const avgData = days.map(d => d.shop.count > 0 ? Math.round(d.shop.rev / d.shop.count) : 0);

  const pointRadius = days.map(d => d.key === selectedKey ? 7 : 4);
  const pointBg = days.map(d => d.key === selectedKey ? '#e74c3c' : '#27ae60');
  const pointBorder = days.map(d => d.key === selectedKey ? '#e74c3c' : '#27ae60');

  const baseOpts = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: { x: { grid: { display: false } }, y: { beginAtZero: true, ticks: { font: { size: 11 } } } }
  };

  if (chartRev) chartRev.destroy();
  chartRev = new Chart(document.getElementById('chartRev'), {
    type: 'line',
    data: { labels, datasets: [{ data: revData, borderColor: '#27ae60', backgroundColor: 'rgba(39,174,96,.1)', fill: true, tension: .3, pointRadius, pointBackgroundColor: pointBg, pointBorderColor: pointBorder }] },
    options: { ...baseOpts, scales: { ...baseOpts.scales, y: { ...baseOpts.scales.y, ticks: { ...baseOpts.scales.y.ticks, callback: v => '$' + (v/1000).toFixed(0) + 'k' } } } }
  });

  if (chartCount) chartCount.destroy();
  chartCount = new Chart(document.getElementById('chartCount'), {
    type: 'line',
    data: { labels, datasets: [{ data: countData, borderColor: '#27ae60', backgroundColor: 'rgba(39,174,96,.1)', fill: true, tension: .3, pointRadius, pointBackgroundColor: pointBg, pointBorderColor: pointBorder }] },
    options: baseOpts
  });

  if (chartAvg) chartAvg.destroy();
  chartAvg = new Chart(document.getElementById('chartAvg'), {
    type: 'line',
    data: { labels, datasets: [{ data: avgData, borderColor: '#27ae60', backgroundColor: 'rgba(39,174,96,.1)', fill: true, tension: .3, pointRadius, pointBackgroundColor: pointBg, pointBorderColor: pointBorder }] },
    options: { ...baseOpts, scales: { ...baseOpts.scales, y: { ...baseOpts.scales.y, ticks: { ...baseOpts.scales.y.ticks, callback: v => '$' + v.toLocaleString() } } } }
  });
}

function updateTable() {
  const tbody = document.getElementById('tableBody');
  let html = '';
  days.forEach(d => {
    const hl = d.key === selectedKey ? ' class="highlight"' : '';
    const total = d.shop.rev + d.team.rev;
    html += '<tr' + hl + '><td>' + d.label + '</td><td>' + d.shop.count + '</td><td>' + fmt(d.shop.rev) + '</td><td>' + d.team.count + '</td><td>' + fmt(d.team.rev) + '</td><td><strong>' + fmt(total) + '</strong></td></tr>';
  });
  let ts = {sc:0,sr:0,tc:0,tr:0};
  days.forEach(d => { ts.sc+=d.shop.count; ts.sr+=d.shop.rev; ts.tc+=d.team.count; ts.tr+=d.team.rev; });
  html += '<tr style="background:#f7f8fa;font-weight:600"><td>合計</td><td>' + ts.sc + '</td><td>' + fmt(ts.sr) + '</td><td>' + ts.tc + '</td><td>' + fmt(ts.tr) + '</td><td><strong>' + fmt(ts.sr+ts.tr) + '</strong></td></tr>';
  tbody.innerHTML = html;
}

buildDateBar();
selectDate(todayKey);
</script>
</body>
</html>
