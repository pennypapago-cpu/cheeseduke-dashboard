<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>起士公爵 業績儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Noto Sans TC', 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; padding: 20px; }
  .container { max-width: 960px; margin: 0 auto; }
  h1 { text-align: center; font-size: 1.6rem; margin-bottom: 4px; }
  .subtitle { text-align: center; color: #888; font-size: 0.85rem; margin-bottom: 18px; }
  .date-selector { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; }
  .date-btn { padding: 8px 16px; border-radius: 20px; border: 1.5px solid #d0d0d0; background: #fff; cursor: pointer; font-size: 0.9rem; font-family: inherit; transition: all 0.2s; position: relative; }
  .date-btn:hover { border-color: #4a90d9; color: #4a90d9; }
  .date-btn.active { background: #4a90d9; color: #fff; border-color: #4a90d9; }
  .date-btn .badge { position: absolute; top: -6px; right: -6px; background: #e74c3c; color: #fff; font-size: 0.6rem; padding: 1px 5px; border-radius: 8px; }
  .kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
  .kpi-card { background: #fff; border-radius: 14px; padding: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; }
  .kpi-card.total { border-top: 4px solid #4a90d9; }
  .kpi-card.shop { border-top: 4px solid #27ae60; }
  .kpi-card.team { border-top: 4px solid #e67e22; }
  .kpi-label { font-size: 0.85rem; color: #888; margin-bottom: 6px; }
  .kpi-value { font-size: 1.8rem; font-weight: 700; }
  .kpi-card.total .kpi-value { color: #4a90d9; }
  .kpi-card.shop .kpi-value { color: #27ae60; }
  .kpi-card.team .kpi-value { color: #e67e22; }
  .kpi-sub { font-size: 0.78rem; color: #aaa; margin-top: 4px; }
  .charts-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
  .chart-box { background: #fff; border-radius: 14px; padding: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .chart-box h3 { font-size: 0.85rem; color: #555; margin-bottom: 8px; text-align: center; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  th { background: #f7f8fa; padding: 10px 8px; font-size: 0.8rem; color: #888; font-weight: 600; text-align: center; }
  td { padding: 10px 8px; text-align: center; font-size: 0.88rem; border-top: 1px solid #f0f0f0; }
  tr.highlight { background: #e8f4fd; }
  .tag-shop { color: #27ae60; font-weight: 600; }
  .tag-team { color: #e67e22; font-weight: 600; }
  @media (max-width: 700px) {
    .kpi-row, .charts-row { grid-template-columns: 1fr; }
    .date-selector { gap: 6px; }
    .date-btn { padding: 6px 12px; font-size: 0.8rem; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>起士公爵 SHOPLINE 業績儀表板</h1>
  <p class="subtitle">最後更新：2026/3/30 15:07 ｜ 官網 vs 團媽</p>

  <div class="date-selector" id="dateSelector"></div>

  <div class="kpi-row">
    <div class="kpi-card total">
      <div class="kpi-label">合計營收</div>
      <div class="kpi-value" id="kpiTotal">-</div>
      <div class="kpi-sub" id="kpiTotalSub"></div>
    </div>
    <div class="kpi-card shop">
      <div class="kpi-label">官網（前台）</div>
      <div class="kpi-value" id="kpiShop">-</div>
      <div class="kpi-sub" id="kpiShopSub"></div>
    </div>
    <div class="kpi-card team">
      <div class="kpi-label">團媽（獨立賣場）</div>
      <div class="kpi-value" id="kpiTeam">-</div>
      <div class="kpi-sub" id="kpiTeamSub"></div>
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-box"><h3>官網營業額趨勢</h3><canvas id="chartRev"></canvas></div>
    <div class="chart-box"><h3>官網訂單數趨勢</h3><canvas id="chartCount"></canvas></div>
    <div class="chart-box"><h3>官網客單價趨勢</h3><canvas id="chartAvg"></canvas></div>
  </div>

  <table>
    <thead>
      <tr>
        <th>日期</th>
        <th>官網筆數</th>
        <th>官網營收</th>
        <th>官網客單價</th>
        <th>團媽筆數</th>
        <th>團媽營收</th>
        <th>團媽客單價</th>
        <th>合計</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
const days = [
  { key: '3/26', label: '3/26 (四)', shop: {count: 11, rev: 8610}, team: {count: 0, rev: 0} },
  { key: '3/27', label: '3/27 (五)', shop: {count: 15, rev: 20143}, team: {count: 7, rev: 16613} },
  { key: '3/28', label: '3/28 (六)', shop: {count: 18, rev: 23567}, team: {count: 18, rev: 30846} },
  { key: '3/29', label: '3/29 (日)', shop: {count: 22, rev: 26671}, team: {count: 7, rev: 13582} },
  { key: '3/30', label: '3/30 (一)', shop: {count: 40, rev: 50143}, team: {count: 6, rev: 6919} }
];
const todayKey = '3/30';

let selectedKey = null;
let chartRev, chartCount, chartAvg;

function fmt(n) { return 'NT$' + n.toLocaleString(); }
function pct(a, b) { return b ? Math.round(a / b * 100) + '%' : '0%'; }

function buildDateSelector() {
  const el = document.getElementById('dateSelector');
  let html = '<button class="date-btn" onclick="selectDate(null)">全部</button>';
  days.forEach(d => {
    const badge = d.key === todayKey ? '<span class="badge">今日</span>' : '';
    html += '<button class="date-btn" data-key="' + d.key + '" onclick="selectDate(\'' + d.key + '\')">' + d.label + badge + '</button>';
  });
  el.innerHTML = html;
}

function selectDate(key) {
  selectedKey = key;
  document.querySelectorAll('.date-btn').forEach(btn => {
    const bk = btn.getAttribute('data-key');
    btn.classList.toggle('active', key === null ? !bk : bk === key);
  });
  updateKPI();
  updateCharts();
  updateTable();
}

function updateKPI() {
  let src = selectedKey ? days.filter(d => d.key === selectedKey) : days;
  let shopRev = 0, shopCount = 0, teamRev = 0, teamCount = 0;
  src.forEach(d => {
    shopRev += d.shop.rev; shopCount += d.shop.count;
    teamRev += d.team.rev; teamCount += d.team.count;
  });
  const total = shopRev + teamRev;
  const totalCount = shopCount + teamCount;
  document.getElementById('kpiTotal').textContent = fmt(total);
  document.getElementById('kpiTotalSub').textContent = totalCount + ' 筆訂單';
  document.getElementById('kpiShop').textContent = fmt(shopRev);
  document.getElementById('kpiShopSub').textContent = shopCount + ' 筆（' + pct(shopCount, totalCount) + '）';
  document.getElementById('kpiTeam').textContent = fmt(teamRev);
  document.getElementById('kpiTeamSub').textContent = teamCount + ' 筆（' + pct(teamCount, totalCount) + '）';
}

function updateCharts() {
  const labels = days.map(d => d.key);
  const revData = days.map(d => d.shop.rev);
  const countData = days.map(d => d.shop.count);
  const avgData = days.map(d => d.shop.count ? Math.round(d.shop.rev / d.shop.count) : 0);

  const pointBg = labels.map(l => l === selectedKey ? '#e74c3c' : '#27ae60');
  const pointR = labels.map(l => l === selectedKey ? 7 : 4);

  const commonOpts = {
    responsive: true,
    plugins: { legend: { display: false } },
    scales: { y: { beginAtZero: true, ticks: { font: { size: 10 } } }, x: { ticks: { font: { size: 10 } } } }
  };

  if (chartRev) chartRev.destroy();
  chartRev = new Chart(document.getElementById('chartRev'), {
    type: 'line',
    data: { labels, datasets: [{ data: revData, borderColor: '#27ae60', backgroundColor: 'rgba(39,174,96,0.1)', fill: true, tension: 0.3, pointBackgroundColor: pointBg, pointRadius: pointR }] },
    options: { ...commonOpts, scales: { ...commonOpts.scales, y: { ...commonOpts.scales.y, ticks: { ...commonOpts.scales.y.ticks, callback: v => (v/1000)+'k' } } } }
  });

  if (chartCount) chartCount.destroy();
  chartCount = new Chart(document.getElementById('chartCount'), {
    type: 'line',
    data: { labels, datasets: [{ data: countData, borderColor: '#27ae60', backgroundColor: 'rgba(39,174,96,0.1)', fill: true, tension: 0.3, pointBackgroundColor: pointBg, pointRadius: pointR }] },
    options: commonOpts
  });

  if (chartAvg) chartAvg.destroy();
  chartAvg = new Chart(document.getElementById('chartAvg'), {
    type: 'line',
    data: { labels, datasets: [{ data: avgData, borderColor: '#27ae60', backgroundColor: 'rgba(39,174,96,0.1)', fill: true, tension: 0.3, pointBackgroundColor: pointBg, pointRadius: pointR }] },
    options: commonOpts
  });
}

function updateTable() {
  let html = '';
  days.forEach(d => {
    const total = d.shop.rev + d.team.rev;
    const hl = d.key === selectedKey ? ' class="highlight"' : '';
    const shopAvg = d.shop.count ? Math.round(d.shop.rev / d.shop.count) : 0;
    const teamAvg = d.team.count ? Math.round(d.team.rev / d.team.count) : 0;
    html += '<tr' + hl + '>';
    html += '<td><strong>' + d.label + '</strong></td>';
    html += '<td class="tag-shop">' + d.shop.count + '</td>';
    html += '<td class="tag-shop">' + fmt(d.shop.rev) + '</td>';
    html += '<td class="tag-shop">' + fmt(shopAvg) + '</td>';
    html += '<td class="tag-team">' + d.team.count + '</td>';
    html += '<td class="tag-team">' + fmt(d.team.rev) + '</td>';
    html += '<td class="tag-team">' + fmt(teamAvg) + '</td>';
    html += '<td><strong>' + fmt(total) + '</strong></td>';
    html += '</tr>';
  });
  document.getElementById('tableBody').innerHTML = html;
}

buildDateSelector();
selectDate(todayKey);
</script>
</body>
</html>
